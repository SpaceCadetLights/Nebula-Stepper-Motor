[env:clockspinner]
platform = espressif32@3.2.0
framework = arduino
board = esp32dev
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dout
board_build.partitions = huge_app.csv
upload_speed = 400000
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Wno-unused-variable
    -Wno-unused-function
    -w
